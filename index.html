  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    header {
      background: #fff;
      padding: 16px 32px;
      border-bottom: 1px solid #ddd;
      font-size: 20px;
      font-weight: bold;
      color: #1a56db;
    }

    .hero {
      text-align: center;
      padding: 80px 20px 60px;
      background: #fff;
      margin: 32px auto;
      max-width: 600px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    .hero h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 16px;
      color: #555;
      margin-bottom: 32px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-blue {
      background: #1a56db;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-blue:hover { background: #1044b0; }

    .btn-outline {
      background: white;
      color: #1a56db;
      border: 2px solid #1a56db;
      padding: 14px 32px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-outline:hover { background: #eef2ff; }

    .toast {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>FlowBase</header>

  <div class="hero">
    <h1>Manage your team smarter</h1>
    <p>The simple tool for tracking work, automating tasks, and growing your business.</p>

    <div class="buttons">
      <button class="btn-blue" onclick="trackClick('sign_up_clicked')">Sign Up Free</button>
      <button class="btn-outline" onclick="trackClick('request_demo_clicked')">Request Demo</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- AMPLITUDE: This tracks the button clicks as events -->
  <script>
    function trackClick(eventName) {
      amplitude.track(eventName, {
        page: 'landing_page',
        time: new Date().toISOString()
      });

      var msg = eventName === 'sign_up_clicked' ? '✅ Sign Up tracked!' : '✅ Request Demo tracked!';
      var toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.display = 'block';
      setTimeout(function() { toast.style.display = 'none'; }, 2500);
    }
  </script>

</body>
</html>
